name: Fix security status translation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch missing Thai status translation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/components/netscope-app.tsx')
          text = path.read_text(encoding='utf-8')

          if '"Not Applicable": "ไม่เกี่ยวข้อง"' in text:
              raise SystemExit(0)

          pattern = re.compile(
              r'(function translateCheckStatus\([\s\S]*?Unknown:\s*"ไม่ทราบ")\s*(\n\s*}\[status\];)',
              re.MULTILINE,
          )
          updated, count = pattern.subn(
              r'\1,\n    "Not Applicable": "ไม่เกี่ยวข้อง"\2',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('translateCheckStatus mapping was not found')

          path.write_text(updated, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/netscope-app.tsx
          git commit -m "fix(ui): translate Not Applicable security status"
          git push
