name: Fix subnet pool filter
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/components/subnet-check-details.tsx')
          s = p.read_text()
          old = 'const dynamicPools = result.dhcpPools.filter(pool => pool.network && pool.prefix !== undefined && rangesOverlap(subnet.network, subnet.prefix, pool.network, pool.prefix));'
          new = 'const dynamicPools = result.dhcpPools.filter(pool => pool.poolType !== "Reservation" && !pool.host && pool.network && pool.prefix !== undefined && rangesOverlap(subnet.network, subnet.prefix, pool.network, pool.prefix));'
          if old not in s:
              raise SystemExit('target not found')
          p.write_text(s.replace(old, new, 1))
          PY
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/subnet-check-details.tsx
          git commit -m "fix(analysis): distinguish dynamic pools from reservations"
          git push
